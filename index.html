<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Portafolio Gamer</title>

  <!-- Fuente gamer -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #0f0f0f, #000);
      color: #fff;
    }

    header {
      text-align: center;
      padding: 40px;
      background: linear-gradient(90deg, #ff00cc, #3333ff);
      box-shadow: 0 0 20px #ff00cc;
    }

    header h1 {
      margin: 0;
      font-size: 3em;
      text-shadow: 0 0 10px #fff, 0 0 20px #ff00cc;
    }

    header p {
      font-size: 1.2em;
      opacity: 0.8;
    }

    .container {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .project {
      background: #111;
      border: 2px solid #00ffff;
      border-radius: 15px;
      padding: 20px;
      transition: 0.3s;
      box-shadow: 0 0 10px #00ffff;
      position: relative;
      overflow: hidden;
    }

    .project:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #ff00cc, 0 0 40px #00ffff;
    }

    .project h3 {
      margin-top: 0;
      color: #00ffff;
    }

    .project p {
      font-size: 0.9em;
      opacity: 0.8;
    }

    .project a {
      display: inline-block;
      margin-top: 10px;
      color: #ff00cc;
      text-decoration: none;
      font-weight: bold;
    }

    /* efecto neón animado */
    .project::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, #00ffff, transparent);
      animation: shine 3s linear infinite;
      top: -50%;
      left: -50%;
      opacity: 0.2;
    }

    @keyframes shine {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #000;
      border-top: 2px solid #ff00cc;
      margin-top: 20px;
    }

    /* botón flotante */
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background: #00ffff;
      color: #000;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff00cc;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h1>⚡ Mi Portafolio ⚡</h1>
  <p>Desarrollador | Proyectos | Tecnología</p>
</header>

<div class="container">

  <div class="project">
    <h3>🚀 Proyecto 1</h3>
    <p>Sistema web que desarrollé usando X tecnología.</p>
    <a href="#" class="btn">Ver proyecto</a>
  </div>

  <div class="project">
    <h3>💻 Proyecto 2</h3>
    <p>Aplicación que resuelve X problema.</p>
    <a href="#" class="btn">Ver proyecto</a>
  </div>

  <div class="project">
    <h3>🎮 Proyecto 3</h3>
    <p>Proyecto tipo gamer o automatización.</p>
    <a href="#" class="btn">Ver proyecto</a>
  </div>

</div>

<footer>
  <p>⚡ Creado por ti - 2026 ⚡</p>
</footer>

</body>
</html>
